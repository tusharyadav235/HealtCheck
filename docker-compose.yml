version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: diagnose_mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: diagnose_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: ${DOCKER_USERNAME:-myuser}/diagnose-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagnose_backend
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/diagnose_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  frontend:
    image: ${DOCKER_USERNAME:-myuser}/diagnose-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diagnose_frontend
    ports:
      - "8002:80"
    depends_on:
      - backend

volumes:
  mysql_data:
